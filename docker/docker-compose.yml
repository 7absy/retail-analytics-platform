version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ./airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    entrypoint: >
      bash -c "airflow db init && airflow users create --username admin --firstname admin --lastname user --role Admin --email admin@example.com --password admin"
    networks:
      - platform-network

  airflow-webserver:
    build:
      context: ./airflow
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}

      ADLS_ACCOUNT_NAME: ${ADLS_ACCOUNT_NAME}
      ADLS_ACCOUNT_KEY: ${ADLS_ACCOUNT_KEY}
      API_BASE_URL: http://api-simulator:8000
      EVENT_BASE_URL: http://event-generator:9000
      OUTPUT_BASE: /tmp/batch

    ports:
      - "8080:8080"
    command: webserver
    restart: on-failure
    volumes:
      - ../pipelines/dags:/opt/airflow/dags
      - ../pipelines:/opt/airflow/pipelines
    networks:
      - platform-network

  airflow-scheduler:
    build:
      context: ./airflow
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}

      ADLS_ACCOUNT_NAME: ${ADLS_ACCOUNT_NAME}
      ADLS_ACCOUNT_KEY: ${ADLS_ACCOUNT_KEY}
      API_BASE_URL: http://api-simulator:8000
      EVENT_BASE_URL: http://event-generator:9000
      OUTPUT_BASE: /tmp/batch

    command: scheduler  
    restart: on-failure
    volumes:
      - ../pipelines/dags:/opt/airflow/dags
      - ../pipelines:/opt/airflow/pipelines
    networks:
      - platform-network

  api-simulator:
    build:
      context: ./api-simulator
    container_name: api-simulator
    ports:
      - "${API_PORT:-8000}:8000"
    restart: on-failure
    networks:
      - platform-network

  event-generator:
    build:
      context: ./event-generator
    container_name: event-generator
    ports:
      - "${EVENT_GENERATOR_PORT:-9000}:9000"
    restart: on-failure

    environment:
      - EVENTSTREAM_ORDERS_CONN=${EVENTSTREAM_ORDERS_CONN}
      - EVENTSTREAM_CLICKSTREAM_CONN=${EVENTSTREAM_CLICKSTREAM_CONN}
      - EVENTSTREAM_FOOTFALL_CONN=${EVENTSTREAM_FOOTFALL_CONN}

    networks:
      - platform-network

  batch-generator:
    build:
      context: ./batch-generator
    container_name: batch-generator
    environment:
      - OUTPUT_BASE=/app/data/batch
    volumes:
      - ../data/batch:/app/data/batch
    networks:
      - platform-network

networks:
  platform-network:

volumes:
  postgres-db-volume: