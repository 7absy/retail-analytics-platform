version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - platform-network

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create
        --username admin
        --firstname admin
        --lastname user
        --role Admin
        --email admin@example.com
        --password admin
      "
    networks:
      - platform-network

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    ports:
      - "8080:8080"
    command: webserver
    restart: on-failure
    volumes:
      - ./pipelines/dags:/opt/airflow/dags  
    networks:
      - platform-network

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: scheduler
    restart: on-failure
    volumes:
      - ./pipelines/dags:/opt/airflow/dags  
    networks:
      - platform-network

networks:
  platform-network:

volumes:
  postgres-db-volume: